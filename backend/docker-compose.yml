version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: knowledge-feed-db
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge123
      POSTGRES_DB: knowledge_feed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
