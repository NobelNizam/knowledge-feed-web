version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: knowledge-feed-db
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge123
      POSTGRES_DB: knowledge_feed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: knowledge-feed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    container_name: knowledge-feed-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  api:
    build: .
    container_name: knowledge-feed-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://knowledge:knowledge123@postgres:5432/knowledge_feed
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: knowledge-feed-worker
    command: node src/workers/contentGenerator.js
    environment:
      - DATABASE_URL=postgresql://knowledge:knowledge123@postgres:5432/knowledge_feed
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      # NVIDIA_API_KEY must be passed from environment
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
