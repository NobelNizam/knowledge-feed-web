version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: knowledge-feed-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: knowledge-feed-redis
    ports:
      - "${REDIS_PORTS:-6379:6379}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    container_name: knowledge-feed-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  api:
    build: .
    image: knowledge-feed-api:latest
    container_name: knowledge-feed-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASS}@postgres:5432/${DATABASE_NAME}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_MODEL=${NVIDIA_MODEL}
      - NVIDIA_API_BASE_URL=${NVIDIA_API_BASE_URL}
      - NVIDIA_EMBED_MODEL=${NVIDIA_EMBED_MODEL}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ANON_VIEW_SALT=${ANON_VIEW_SALT}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build: .
    image: knowledge-feed-worker:latest
    container_name: knowledge-feed-worker
    command: node dist/workers/startWorker.js
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASS}@postgres:5432/${DATABASE_NAME}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_MODEL=${NVIDIA_MODEL}
      - NVIDIA_API_BASE_URL=${NVIDIA_API_BASE_URL}
      - NVIDIA_EMBED_MODEL=${NVIDIA_EMBED_MODEL}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ANON_VIEW_SALT=${ANON_VIEW_SALT}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
