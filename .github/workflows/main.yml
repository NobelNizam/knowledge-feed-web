name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg14
        env:
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge123
          POSTGRES_DB: knowledge_feed
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
        
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Run Backend Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://knowledge:knowledge123@localhost:5432/knowledge_feed
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: testsecret
      run: npm test

    - name: Install Web Dependencies
      working-directory: ./web
      run: npm ci

    - name: Run Web Linting & Tests
      working-directory: ./web
      run: |
        npm run lint || true
        # npm test (uncomment when tests are available)

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Backend API Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ghcr.io/${{ github.repository }}/knowledge-api:latest
        
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger VPS Deployment
      run: |
        echo "Placeholder for VPS Deployment webhook / SSH command"
        # Example: curl -X POST ${{ secrets.VPS_DEPLOY_HOOK }}
        # Or SSH action to run: docker-compose pull && docker-compose up -d
